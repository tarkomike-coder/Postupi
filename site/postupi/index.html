<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Поступление — мониторинг</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #0a1226;
    --bg-card: #0f1d3d;
    --bg-card-2: #12244a;
    --border: #1e3260;
    --text: #e6ecf7;
    --muted: #8ea3c7;
    --accent: #4f8cff;
    --green: #2ecc71;
    --red: #ff5a5a;
    --amber: #ffb44d;
    --shadow: 0 6px 20px rgba(0, 0, 0, .35);
    --progress-h: 46px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(160deg, #081024 0%, #0a1226 50%, #0c1730 100%);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: calc(var(--progress-h) + 24px) 18px 48px; }
  header.top { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  h1 { font-size: 22px; margin: 0; font-weight: 650; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  section { margin-bottom: 28px; }
  h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; color: #cdd9f0; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 14px; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; box-shadow: var(--shadow); position: relative;
  }
  .card .priority-badge {
    position: absolute; top: 16px; right: 16px; font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; white-space: nowrap;
  }
  .card .name { font-size: 14.5px; font-weight: 650; padding-right: 66px; margin-bottom: 10px; }
  .card .prob { font-size: 32px; font-weight: 750; line-height: 1; }
  .card .prob.green { color: var(--green); }
  .card .prob.amber { color: var(--amber); }
  .card .prob.red { color: var(--red); }
  .card .prob-label { color: var(--muted); font-size: 11.5px; margin-top: 4px; }
  .card .final-line { font-size: 12.5px; color: var(--muted); margin: 10px 0 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .card .final-line b { color: var(--text); }

  .position-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; margin: 10px 0 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .position-row .k { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .02em; }
  .position-row .real .v { font-size: 22px; font-weight: 750; color: #fff; margin-top: 2px; }
  .position-row .real .v .of { font-size: 14px; font-weight: 500; color: var(--muted); }
  .position-row .real .hint { font-size: 11px; color: var(--muted); margin-top: 3px; max-width: 220px; }
  .position-row .raw { text-align: right; font-size: 11px; color: var(--muted); max-width: 140px; }
  .position-row .raw b { display: block; color: var(--text); font-size: 13px; font-weight: 650; margin-top: 2px; }

  .scores { display: flex; flex-direction: column; gap: 7px; }
  .scores .row { display: flex; align-items: baseline; justify-content: space-between; font-size: 12.5px; gap: 10px; }
  .scores .row .label { color: var(--muted); white-space: nowrap; }
  .scores .row .val { display: flex; align-items: baseline; gap: 7px; white-space: nowrap; }
  .scores .row .val b { font-size: 14px; font-weight: 650; color: #fff; }
  .scores .row.mine { padding-bottom: 7px; margin-bottom: 2px; border-bottom: 1px dashed var(--border); }
  .scores .row.mine .val b { font-size: 17px; }
  .deadline-note { font-size: 11px; color: var(--muted); margin-top: -2px; }
  .delta { font-size: 11.5px; font-weight: 650; }
  .delta.pos { color: var(--green); }
  .delta.neg { color: var(--red); }

  .card .flag { display: inline-block; margin-top: 14px; font-size: 11.5px; padding: 3px 8px; border-radius: 999px; }
  .flag.admitted { background: rgba(46,204,113,.15); color: var(--green); }
  .flag.not-admitted { background: rgba(255,90,90,.12); color: var(--red); }
  .flag.uncertain { background: rgba(255,180,77,.15); color: var(--amber); }

  .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-box { height: 280px; }
  .chart-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .history-legend {
    display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap;
    margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .legend-item { display: inline-flex; align-items: center; gap: 6px; min-width: 0; color: #cdd9f0; font-size: 11.5px; }
  .legend-swatch { width: 18px; height: 3px; border-radius: 999px; flex: 0 0 auto; background: var(--legend-color); }
  .legend-swatch.legacy {
    height: 0; border-top: 3px dashed var(--legend-color); background: transparent;
  }
  .legend-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
  .legend-model { color: var(--muted); margin-left: auto; }
  @media (max-width: 800px) {
    .legend-model { width: 100%; margin-left: 0; }
    .legend-label { max-width: 72vw; }
  }

  /* Сводка сверху - вертикальный список (тот же порядок, что и секции
     ниже - явный намёк, что дальше на странице продолжение). Каждая
     строка - одновременно статус и ссылка для перехода к разделу вуза. */
  .summary { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .summary-item {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 12.5px; display: flex; align-items: flex-start; gap: 10px;
    flex-wrap: wrap;
    text-decoration: none; color: inherit; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .summary-item:hover { border-color: var(--uni-color, var(--accent)); background: var(--bg-card-2); }
  .summary-item .uni { font-weight: 700; color: #fff; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .summary-item .uni .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--uni-color, var(--accent)); flex-shrink: 0; }
  .summary-item .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .summary-item .jump { margin-left: auto; color: var(--muted); font-size: 11.5px; white-space: nowrap; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .chip.green { background: rgba(46,204,113,.15); color: var(--green); }
  .chip.amber { background: rgba(255,180,77,.15); color: var(--amber); }
  .chip.red { background: rgba(255,90,90,.12); color: var(--red); }
  .chip.muted { background: rgba(142,163,199,.12); color: var(--muted); }

  /* Полноширинная полоса прогресса - зафиксирована сверху экрана, во всю
     ширину (не ограничена шириной .wrap). Слева направо - зоны вузов
     (каждая своим цветовым градиентом, пропорционально реальной высоте её
     контента), поверх - маркер текущей позиции скролла по всей странице. */
  .uni-progress {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    height: var(--progress-h);
  }
  .uni-progress-track { position: relative; width: 100%; height: 100%; box-shadow: 0 2px 14px rgba(0,0,0,.4); }
  .uni-progress-zone {
    position: absolute; top: 0; bottom: 0;
    display: flex; align-items: center;
    text-decoration: none; white-space: nowrap; overflow: hidden;
  }
  .uni-progress-zone .label {
    padding: 0 14px; font-size: 13px; font-weight: 750; color: rgba(255,255,255,.92);
    text-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .uni-progress-marker {
    position: absolute; top: 0; height: 100%; width: 4px; z-index: 2;
    background: #fff; transform: translateX(-50%);
    box-shadow: 0 0 12px 2px rgba(255,255,255,.85);
    pointer-events: none;
  }
  .uni-progress-marker::after {
    content: ""; position: absolute; left: 50%; bottom: -7px;
    width: 15px; height: 15px; border-radius: 50%; background: #fff;
    transform: translateX(-50%); box-shadow: 0 0 14px 4px rgba(255,255,255,.9), 0 0 0 3px rgba(10,18,38,.9);
  }

  /* Территория вуза: у каждого вуза - свой цвет, липкий баннер прямо под
     полоской прогресса показывает, где именно ты находишься, пока листаешь. */
  .uni-section { margin-bottom: 44px; scroll-margin-top: calc(var(--progress-h) + 16px); }
  .uni-banner {
    position: sticky; top: var(--progress-h); z-index: 5;
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    padding: 14px 18px; margin-bottom: 20px; border-radius: 12px;
    background: var(--uni-bg, var(--bg-card)); border: 1px solid var(--uni-color, var(--border));
    border-left-width: 5px;
    backdrop-filter: blur(6px);
  }
  .uni-banner .uni-name { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: .01em; }
  .uni-banner .uni-note { font-size: 12px; color: var(--muted); }
  .source-switch {
    margin-left: auto; display: inline-flex; gap: 4px; padding: 3px;
    border: 1px solid var(--uni-color, var(--border)); border-radius: 8px;
    background: rgba(10, 18, 38, .45);
  }
  .source-switch button {
    appearance: none; border: 0; border-radius: 6px; padding: 6px 10px;
    background: transparent; color: var(--muted); font: inherit; font-size: 12px;
    cursor: pointer; white-space: nowrap;
  }
  .source-switch button.active {
    background: var(--uni-color, var(--accent)); color: #fff; font-weight: 650;
  }
  @media (max-width: 640px) {
    .source-switch { width: 100%; margin-left: 0; }
    .source-switch button { flex: 1; }
  }

  ul.events { list-style: none; margin: 0; padding: 0; }
  ul.events li { padding: 10px 4px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  ul.events li:last-child { border-bottom: none; }
  ul.events .ts { color: var(--muted); font-size: 12px; margin-right: 8px; }
  .empty { color: var(--muted); font-size: 13.5px; padding: 10px 2px; }
</style>
</head>
<body>
<nav class="uni-progress" id="uni-progress"><div class="uni-progress-track" id="uni-progress-track"></div></nav>
<div class="wrap">

  <header class="top">
    <div>
      <h1 id="page-title">Поступление — мониторинг</h1>
      <div class="sub" id="page-sub">загрузка…</div>
    </div>
  </header>

  <div class="summary" id="summary"></div>

  <div id="universities"></div>

</div>

<script>
const API_BASE = (location.hostname === "postupi.tarko.su")
  ? "/api"
  : "http://127.0.0.1:8010";

const PALETTE = ["#4f8cff", "#2ecc71", "#ffb44d", "#ff5a5a", "#b98cff", "#4fd0ff", "#ff8cc8"];
const colorFor = (i) => PALETTE[i % PALETTE.length];

// Цвет "территории" каждого вуза - используется в баннере-разделителе и в
// сводке сверху, чтобы визуально не путать, где чей раздел.
const UNI_COLORS = ["#4f8cff", "#a855f7", "#17a2b8", "#e08e0b"];
const uniColor = (i) => UNI_COLORS[i % UNI_COLORS.length];
const uniColorBg = (i) => {
  const hex = uniColor(i).replace("#", "");
  const r = parseInt(hex.slice(0, 2), 16), g = parseInt(hex.slice(2, 4), 16), b = parseInt(hex.slice(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, .12)`;
};

function probClass(p) {
  if (p === null || p === undefined) return "";
  if (p >= 70) return "green";
  if (p >= 30) return "amber";
  return "red";
}

function fmt(v, suffix = "") {
  return (v === null || v === undefined) ? "—" : `${v}${suffix}`;
}

function fmt1(v) {
  return (v === null || v === undefined) ? "—" : Math.round(v * 10) / 10;
}

function fmtGap(v) {
  if (v === null || v === undefined) return "";
  const r = Math.round(v * 10) / 10;
  return `${r > 0 ? "+" : ""}${r}`;
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
}

function fmtDeadlineMsk(iso) {
  const d = new Date(iso || "2026-07-25T17:00:00+03:00");
  return d.toLocaleString("ru-RU", {
    timeZone: "Europe/Moscow",
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  }).replace(",", "");
}

function shortName(s, n = 22) {
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

async function fetchJSON(path, timeoutMs = 12000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  let res;
  try {
    res = await fetch(`${API_BASE}${path}`, { signal: controller.signal });
  } catch (err) {
    if (err.name === "AbortError") throw new Error(`${path}: превышено время ожидания`);
    throw err;
  } finally {
    clearTimeout(timer);
  }
  if (!res.ok) throw new Error(`${path}: HTTP ${res.status}`);
  return res.json();
}

// Больше нет вкладок-переключателей ("непонятно, что это кнопки") - вместо
// этого страница показывает оба вуза целиком, один за другим, каждый в
// своей цветной "территории" со своим баннером сверху. charts[i] - набор
// графиков конкретного вуза по индексу в списке universities.
let charts = [];
let appView = null;

function buildLineChart(canvas, yOptions = {}) {
  const ctx = canvas.getContext("2d");
  return new Chart(ctx, {
    type: "line",
    data: { datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "nearest", intersect: true },
      scales: {
        x: { type: "time", time: { unit: "day" }, ticks: { color: "#8ea3c7" }, grid: { color: "#1e3260" } },
        y: { ...yOptions, ticks: { color: "#8ea3c7" }, grid: { color: "#1e3260" } },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          titleFont: { size: 12 }, bodyFont: { size: 12 }, padding: 8,
          callbacks: {
            label: (ctx) => {
              const model = ctx.raw && ctx.raw.model_label ? ` · ${ctx.raw.model_label}` : "";
              return `${ctx.dataset.label}: ${ctx.formattedValue}${model}`;
            },
          },
        },
      },
    },
  });
}

function buildBarChart(canvas, datasetDefs) {
  const ctx = canvas.getContext("2d");
  return new Chart(ctx, {
    type: "bar",
    data: { labels: [], datasets: datasetDefs.map(d => ({ ...d, data: [] })) },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "nearest", intersect: true },
      scales: {
        x: { ticks: { color: "#8ea3c7" }, grid: { display: false } },
        y: { ticks: { color: "#8ea3c7" }, grid: { color: "#1e3260" } },
      },
      plugins: {
        legend: { labels: { color: "#e6ecf7", boxWidth: 12, font: { size: 11 } } },
        tooltip: { titleFont: { size: 12 }, bodyFont: { size: 12 }, padding: 8 },
      },
    },
  });
}

function renderUniversitySections(universities, sourceChoices = {}) {
  const el = document.getElementById("universities");
  el.innerHTML = universities.map((u, i) => `
    <div class="uni-section" id="uni-section-${i}" style="--uni-color: ${uniColor(i)}; --uni-bg: ${uniColorBg(i)}">
      <div class="uni-banner">
        <span class="uni-name">${u}</span>
        <span class="uni-note">направления, конкуренты и динамика по этому вузу — ниже</span>
        ${sourceChoices[u] ? `
          <span class="source-switch" data-base="${u}">
            ${sourceChoices[u].map(choice => `
              <button type="button" class="source-toggle-btn ${choice.active ? "active" : ""}"
                data-base="${u}" data-source="${choice.key}" aria-pressed="${choice.active ? "true" : "false"}">
                ${choice.label}
              </button>
            `).join("")}
          </span>
        ` : ""}
      </div>

      <section>
        <h2>Направления сейчас</h2>
        <div class="cards" id="cards-${i}"><div class="empty">Загрузка…</div></div>
      </section>

      <section>
        <h2>Состав конкуренции</h2>
        <div class="panel">
          <div class="charts-grid">
            <div>
              <div class="sub" style="margin-bottom:6px">Кто реально конкурирует сейчас</div>
              <div class="chart-box"><canvas id="chart-composition-real-${i}"></canvas></div>
            </div>
            <div>
              <div class="sub" style="margin-bottom:6px">Без согласия — могут присоединиться позже</div>
              <div class="chart-box"><canvas id="chart-composition-pending-${i}"></canvas></div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>Динамика</h2>
        <div class="panel">
          <div class="history-legend" id="history-legend-${i}"></div>
          <div class="charts-grid">
            <div><div class="sub" style="margin-bottom:6px">Вероятность зачисления, % (независимо от приоритетов)</div><div class="chart-box"><canvas id="chart-prob-${i}"></canvas></div></div>
            <div><div class="sub" style="margin-bottom:6px">Реальное место</div><div class="chart-box"><canvas id="chart-position-${i}"></canvas></div></div>
            <div>
              <div class="sub" style="margin-bottom:6px">Прогноз проходного балла</div>
              <div class="chart-box"><canvas id="chart-cutoff-${i}"></canvas></div>
              <div class="chart-hint">Линия короче остальных или обрывается — значит, для этого направления пока мало кто подал согласие, чтобы надёжно оценить проходной балл.</div>
            </div>
            <div><div class="sub" style="margin-bottom:6px">Разрыв (мой балл − прогноз проходного)</div><div class="chart-box"><canvas id="chart-gap-${i}"></canvas></div></div>
          </div>
        </div>
      </section>

      <section>
        <h2>История изменений заявления</h2>
        <div class="panel">
          <ul class="events" id="events-${i}"><li class="empty">Загрузка…</li></ul>
        </div>
      </section>
    </div>
  `).join("");

  charts = universities.map((_, i) => ({
    prob: buildLineChart(document.getElementById(`chart-prob-${i}`), { min: 0, max: 100 }),
    position: buildLineChart(document.getElementById(`chart-position-${i}`)),
    cutoff: buildLineChart(document.getElementById(`chart-cutoff-${i}`)),
    gap: buildLineChart(document.getElementById(`chart-gap-${i}`)),
    compositionReal: buildBarChart(document.getElementById(`chart-composition-real-${i}`), [
      { label: "Каскад ведёт сюда (реальные конкуренты)", backgroundColor: "#ff5a5a" },
      { label: "Согласие есть, но каскад уводит выше (не мешают)", backgroundColor: "#ffb44d" },
    ]),
    compositionPending: buildBarChart(document.getElementById(`chart-composition-pending-${i}`), [
      { label: "Без согласия (могут присоединиться)", backgroundColor: "#4f8cff" },
    ]),
  }));

  // Реальная разметка полосы (пропорции по высоте секций) строится позже,
  // после того как в секции подгрузится настоящий контент - см. loadAll().
}

// Двухцветные (тёмный -> светлый) градиенты по каждому вузу для полосы
// прогресса - тот же порядок цветов, что и UNI_COLORS.
const UNI_GRADIENTS = [
  ["#2f5fd9", "#6ea8ff"],
  ["#7c3aed", "#c99bfb"],
  ["#0e7c8f", "#4fd0ff"],
  ["#b06a06", "#ffb44d"],
];
const uniGradient = (i) => UNI_GRADIENTS[i % UNI_GRADIENTS.length];

let progressRange = null; // {startY, endY, zones: [{idx, pctStart, pctEnd}, ...]}

function layoutProgressBar(universities) {
  const track = document.getElementById("uni-progress-track");
  const sections = universities.map((_, i) => document.getElementById(`uni-section-${i}`));
  if (!sections.length || sections.some(s => !s)) return;

  const startY = sections[0].offsetTop;
  const endY = sections[sections.length - 1].offsetTop + sections[sections.length - 1].offsetHeight;
  const total = Math.max(endY - startY, 1);

  const gradientStops = [];
  const zones = [];
  let cursor = 0;
  sections.forEach((section, i) => {
    const pctStart = (cursor / total) * 100;
    cursor += section.offsetHeight;
    const pctEnd = (cursor / total) * 100;
    const [c1, c2] = uniGradient(i);
    gradientStops.push(`${c1} ${pctStart}%`, `${c2} ${pctEnd}%`);
    zones.push({ idx: i, pctStart, pctEnd });
  });

  track.style.background = `linear-gradient(90deg, ${gradientStops.join(", ")})`;
  track.querySelectorAll(".uni-progress-zone").forEach(z => z.remove());
  zones.forEach(({ idx, pctStart, pctEnd }) => {
    const zone = document.createElement("a");
    zone.className = "uni-progress-zone";
    zone.href = `#uni-section-${idx}`;
    zone.style.left = `${pctStart}%`;
    zone.style.width = `${pctEnd - pctStart}%`;
    zone.innerHTML = `<span class="label">${universities[idx]}</span>`;
    track.appendChild(zone);
  });

  let marker = document.getElementById("uni-progress-marker");
  if (!marker) {
    marker = document.createElement("div");
    marker.id = "uni-progress-marker";
    marker.className = "uni-progress-marker";
    track.appendChild(marker);
  }

  progressRange = { startY, endY: startY + total };
  updateProgressMarker();
}

function updateProgressMarker() {
  if (!progressRange) return;
  const marker = document.getElementById("uni-progress-marker");
  if (!marker) return;
  const { startY, endY } = progressRange;
  // Маркер отражает то, что видно ПОСЕРЕДИНЕ экрана, а не только верхний
  // край - честнее показывает, что ты сейчас реально читаешь.
  const viewY = window.scrollY + window.innerHeight / 2;
  let frac = (viewY - startY) / Math.max(endY - startY, 1);
  frac = Math.max(0, Math.min(1, frac));
  marker.style.left = `${frac * 100}%`;
}

window.addEventListener("scroll", () => requestAnimationFrame(updateProgressMarker), { passive: true });
window.addEventListener("resize", () => {
  clearTimeout(window.__progressResizeTimer);
  window.__progressResizeTimer = setTimeout(() => layoutProgressBar(lastUniversities), 200);
});

let lastUniversities = [];

function renderCards(status, idx) {
  const el = document.getElementById(`cards-${idx}`);
  const dirs = status.directions || [];
  if (!dirs.length) {
    el.innerHTML = `<div class="empty">Нет данных — направления не найдены в последнем прогоне.</div>`;
    return;
  }
  el.innerHTML = dirs.map(d => {
    // Главный статус - проходит ли направление по текущему реальному месту,
    // без учета собственных приоритетов. Monte Carlo остается отдельным
    // риск-прогнозом, но не красит проходную текущую позицию в "не проходит".
    const currentPasses = d.real_competitor_position !== null && d.real_competitor_position !== undefined
      && d.seats_budget !== null && d.seats_budget !== undefined
      && d.real_competitor_position <= d.seats_budget;
    const headlineText = currentPasses ? "проходит" : "не проходит";
    const headlineClass = currentPasses ? "green" : "red";
    const standalone = d.standalone_probability_pct;

    let flagClass = currentPasses ? "admitted" : "not-admitted";
    let flagText = currentPasses ? "проходит сейчас" : "сейчас вне мест";
    if (d.deterministic_admitted) { flagText += " · текущий прогноз зачисления"; }

    const deltaHtml = (gapValue) => {
      const g = fmtGap(gapValue);
      if (!g) return "";
      const cls = gapValue > 0 ? "pos" : (gapValue < 0 ? "neg" : "");
      return `<span class="delta ${cls}">${g}</span>`;
    };
    const scoreRow = (label, value, gapValue, mine = false) => `
      <div class="row${mine ? " mine" : ""}">
        <span class="label">${label}</span>
        <span class="val"><b>${value}</b>${gapValue !== undefined ? deltaHtml(gapValue) : ""}</span>
      </div>
    `;
    const deadlineNote = `
      <div class="deadline-note">Прогноз учитывает завершение подачи заявлений на бюджет: ${fmtDeadlineMsk(d.application_deadline_at)} МСК</div>
    `;

    return `
    <div class="card">
      <div class="priority-badge">приоритет ${fmt(d.priority)}</div>
      <div class="name">${d.name}</div>
      <div class="prob ${headlineClass}">${headlineText}</div>
      <div class="prob-label">текущее положение без учёта приоритетов</div>
      <div class="final-line">Итоговый шанс попасть именно сюда (с учётом каскада всех приоритетов): <b>${fmt(d.probability_pct !== null ? Math.round(d.probability_pct) : null, "%")}</b></div>
      <div class="position-row">
        <div class="real">
          <div class="k">Реальное место</div>
          <div class="v">${fmt(d.real_competitor_position)} <span class="of">из ${fmt(d.real_competitor_count)}</span></div>
          <div class="hint">конкурентов, которых каскад реально ведёт сюда · бюджетных мест: ${fmt(d.seats_budget)}</div>
        </div>
        <div class="raw">
          Позиция в общем списке<br>(все заявки, включая без согласия)
          <b>${fmt(d.position)}-я</b>
        </div>
      </div>
      <div class="scores">
        ${scoreRow("Мой балл", fmt(d.total_score))}
        ${scoreRow("Риск-прогноз направления", fmt(standalone !== null && standalone !== undefined ? Math.round(standalone) : null, "%"))}
        ${d.cutoff_2025 != null ? scoreRow("Проходной балл 2025", fmt(d.cutoff_2025), d.total_score - d.cutoff_2025) : ""}
        ${scoreRow("Прогноз проходного", fmt1(d.predicted_cutoff_score), d.predicted_gap)}
        ${deadlineNote}
        ${scoreRow("Средний балл конкурентов", fmt1(d.avg_real_competitor_score), d.gap_to_avg)}
        ${scoreRow("Мин. балл конкурентов", fmt(d.min_real_competitor_score), d.gap_to_min)}
      </div>
      <span class="flag ${flagClass}">${flagText}</span>
    </div>
  `;
  }).join("");
}

function renderComposition(status, idx) {
  const dirs = status.directions || [];
  const labels = dirs.map(d => shortName(d.name));
  const c = charts[idx];

  c.compositionReal.data.labels = labels;
  c.compositionReal.data.datasets[0].data = dirs.map(d => d.cascaded_in_count ?? 0);
  c.compositionReal.data.datasets[1].data = dirs.map(d => d.consent_elsewhere_count ?? 0);
  c.compositionReal.update();

  c.compositionPending.data.labels = labels;
  c.compositionPending.data.datasets[0].data = dirs.map(d => d.no_consent_count ?? 0);
  c.compositionPending.update();
}

function renderHistory(history, idx) {
  const dirs = history.directions || [];
  const c = charts[idx];

  const modelLabel = (v) => v === "full_cascade_v1" ? "полный каскад" : "старая модель";
  const hasFull = dirs.some(d => (d.points || []).some(p => p.model_version === "full_cascade_v1"));
  const hasLegacy = dirs.some(d => (d.points || []).some(p => (p.model_version || "legacy_partial") !== "full_cascade_v1"));
  const mixedModels = hasFull && hasLegacy;

  const legend = document.getElementById(`history-legend-${idx}`);
  if (legend) {
    const directionItems = dirs.map((d, i) => `
      <span class="legend-item">
        <span class="legend-swatch" style="--legend-color:${colorFor(i)}"></span>
        <span class="legend-label">${shortName(d.name, 34)}</span>
      </span>
    `).join("");
    const modelItems = mixedModels ? `
      <span class="legend-item legend-model">
        <span class="legend-swatch" style="--legend-color:#cdd9f0"></span>
        <span>полный каскад</span>
      </span>
      <span class="legend-item">
        <span class="legend-swatch legacy" style="--legend-color:#8ea3c7"></span>
        <span>старая модель</span>
      </span>
    ` : "";
    legend.innerHTML = directionItems + modelItems;
  }

  const datasetsFor = (field) => dirs.flatMap((d, i) => {
    const byModel = {};
    d.points
      .filter(p => p[field] !== null && p[field] !== undefined)
      .forEach(p => {
        const key = p.model_version || "legacy_partial";
        (byModel[key] ||= []).push({ x: p.timestamp, y: p[field], model_version: key, model_label: modelLabel(key), coverage: p.coverage });
      });
    return Object.entries(byModel).map(([model, points]) => ({
      label: shortName(d.name, 30),
      data: points,
      borderColor: colorFor(i),
      backgroundColor: colorFor(i),
      borderDash: mixedModels && model !== "full_cascade_v1" ? [6, 4] : [],
      borderWidth: model === "full_cascade_v1" ? 3 : 2,
      pointRadius: model === "full_cascade_v1" ? 3 : 2.5,
      pointHoverRadius: 5,
      tension: 0.25,
      spanGaps: true,
    }));
  });

  c.prob.data.datasets = datasetsFor("standalone_probability_pct");
  c.position.data.datasets = datasetsFor("real_competitor_position");
  c.cutoff.data.datasets = datasetsFor("predicted_cutoff_score");
  c.gap.data.datasets = datasetsFor("predicted_gap");

  c.prob.update(); c.position.update(); c.cutoff.update(); c.gap.update();
}

function renderEvents(events, idx) {
  const el = document.getElementById(`events-${idx}`);
  const items = events.events || [];
  if (!items.length) {
    el.innerHTML = `<li class="empty">Пока изменений не зафиксировано.</li>`;
    return;
  }
  const labels = {
    priority_changed: (e) => `Приоритет «${e.direction}»: ${e.old_value} → ${e.new_value}`,
    direction_added: (e) => `Добавлено направление «${e.direction}» (приоритет ${e.new_value})`,
    direction_removed: (e) => `Убрано направление «${e.direction}» (был приоритет ${e.old_value})`,
  };
  el.innerHTML = items.map(e => `
    <li><span class="ts">${fmtDate(e.detected_at)}</span>${(labels[e.event_type] || (() => e.event_type))(e)}</li>
  `).join("");
}

function renderSummary(universities, statuses) {
  const el = document.getElementById("summary");
  el.innerHTML = universities.map((u, i) => {
    const dirs = (statuses[i] && statuses[i].directions) || [];

    const chips = dirs.map(d => {
      const currentPasses = d.real_competitor_position !== null && d.real_competitor_position !== undefined
        && d.seats_budget !== null && d.seats_budget !== undefined
        && d.real_competitor_position <= d.seats_budget;
      const cls = currentPasses ? "green" : "red";
      const pctText = currentPasses ? "проходит" : "не проходит";
      const mark = d.deterministic_admitted ? " ✓" : "";
      return `<span class="chip ${cls}">${shortName(d.name, 18)} — ${pctText}${mark}</span>`;
    }).join("");

    return `
      <a class="summary-item" href="#uni-section-${i}" style="--uni-color: ${uniColor(i)}">
        <span class="uni"><span class="dot"></span>${u}</span>
        <div class="chips">${chips || "нет данных"}</div>
        <span class="jump">к графикам ↓</span>
      </a>
    `;
  }).join("");
}

const SOURCE_GROUPS = {
  "МАИ Госуслуги": { base: "МАИ", label: "Госуслуги" },
};

function buildViewModel(list, perUni) {
  const dataByName = {};
  list.forEach((u, idx) => { dataByName[u] = perUni[idx]; });

  const hiddenSources = new Set(Object.keys(SOURCE_GROUPS));
  const displayList = list.filter(u => !hiddenSources.has(u));
  const activeSourceByBase = {};
  const sourceChoices = {};

  Object.entries(SOURCE_GROUPS).forEach(([sourceName, meta]) => {
    if (!dataByName[sourceName] || !dataByName[meta.base]) return;
    activeSourceByBase[meta.base] = meta.base;
    sourceChoices[meta.base] = [
      { key: meta.base, label: meta.base, active: true },
      { key: sourceName, label: meta.label, active: false },
    ];
  });

  return { displayList, dataByName, activeSourceByBase, sourceChoices };
}

function currentPerUni() {
  return appView.displayList.map(u => {
    const source = appView.activeSourceByBase[u] || u;
    return appView.dataByName[source];
  });
}

function renderCurrentData() {
  const perUni = currentPerUni();
  const statuses = new Array(appView.displayList.length);
  appView.displayList.forEach((u, idx) => {
    const { status, history, events } = perUni[idx];
    statuses[idx] = status;
    renderCards(status, idx);
    renderComposition(status, idx);
    renderHistory(history, idx);
    renderEvents(events, idx);
  });
  renderSummary(appView.displayList, statuses);
  const latestFinishedAt = statuses[0] && statuses[0].run ? statuses[0].run.finished_at : null;
  document.getElementById("page-sub").textContent = `обновлено ${fmtDate(latestFinishedAt)}`;

  lastUniversities = appView.displayList;
  layoutProgressBar(appView.displayList);
  requestAnimationFrame(() => layoutProgressBar(appView.displayList));
}

document.addEventListener("click", (event) => {
  const btn = event.target.closest(".source-toggle-btn");
  if (!btn || !appView) return;
  const base = btn.dataset.base;
  const source = btn.dataset.source;
  appView.activeSourceByBase[base] = source;
  document.querySelectorAll(`.source-toggle-btn[data-base="${base}"]`).forEach(b => {
    const active = b.dataset.source === source;
    b.classList.toggle("active", active);
    b.setAttribute("aria-pressed", active ? "true" : "false");
  });
  renderCurrentData();
});

let universitiesCache = null;

async function getUniversities() {
  if (!universitiesCache) {
    universitiesCache = fetchJSON("/postupi/universities").catch(err => {
      universitiesCache = null;
      throw err;
    });
  }
  return universitiesCache;
}

// Единый рендер из готовых данных - общий для вшитого снапшота и живого API.
// perUni[idx] = { status, history, events } в том же виде, что отдают эндпоинты.
function renderAll(list, perUni) {
  appView = buildViewModel(list, perUni);
  renderUniversitySections(appView.displayList, appView.sourceChoices);
  renderCurrentData();
}

async function loadAll() {
  try {
    // 1) Основной путь: данные вшиты в страницу генератором после синка.
    // Ноль запросов к API - нечему обрываться на слабой мобильной сети.
    const snap = window.__SNAPSHOT__;
    if (snap && Array.isArray(snap.universities) && snap.universities.length) {
      const withData = snap.universities.filter(u => u.status);
      const list = withData.map(u => u.name);
      const perUni = withData.map(u => ({ status: u.status, history: u.history, events: u.events }));
      renderAll(list, perUni);
      return;
    }

    // 2) Fallback (локальная разработка без снапшота): живой API.
    const unis = await getUniversities();
    const raw = unis.universities || ["МАИ"];
    // МАИ - исходный, основной вуз сайта - всегда первым, остальные по алфавиту.
    const list = ["МАИ", ...raw.filter(u => u !== "МАИ").sort()];
    const perUni = await Promise.all(list.map(async (u) => {
      const q = `?university=${encodeURIComponent(u)}`;
      const [status, history, events] = await Promise.all([
        fetchJSON(`/postupi/status${q}`),
        fetchJSON(`/postupi/history${q}`),
        fetchJSON(`/postupi/events${q}`),
      ]);
      return { status, history, events };
    }));
    renderAll(list, perUni);
  } catch (err) {
    document.getElementById("page-sub").textContent = `Ошибка загрузки: ${err.message}`;
  }
}

loadAll();
</script>
